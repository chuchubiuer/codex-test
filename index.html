<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="cc 的前端练习主页">
  <title>cc 的第一个上线网页</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="hero" aria-labelledby="page-title">
      <p class="eyebrow">CC · FRONTEND PRACTICE</p>
      <h1 id="page-title">cc 的第一个上线网页</h1>
      <p class="subtitle">这是我用 GitHub Pages 发布的前端练习项目</p>
      <p class="intro">从网页的骨架开始，一点点练习样式和互动，把学到的内容变成一个真正可以打开的小网站。</p>

      <button id="celebrateButton" type="button">点击看看</button>
      <p id="message" class="message" aria-live="polite"></p>
    </section>

    <section class="card-grid" aria-label="前端练习内容">
      <article class="card">
        <span class="card-number">01</span>
        <h2>HTML 结构</h2>
        <p>练习网页内容和页面骨架</p>
      </article>

      <article class="card">
        <span class="card-number">02</span>
        <h2>CSS 样式</h2>
        <p>练习排版、颜色、按钮和响应式布局</p>
      </article>

      <article class="card">
        <span class="card-number">03</span>
        <h2>JS 互动</h2>
        <p>练习点击按钮后的简单反馈</p>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
